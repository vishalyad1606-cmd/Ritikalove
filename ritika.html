<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For Ritika ❤️</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to right, #ff758c, #ff7eb3);
      color: white;
      text-align: center;
    }.container {
  padding: 50px 20px;
}

h1 {
  font-size: 3em;
  animation: fadeIn 2s ease-in-out;
}

p {
  font-size: 1.3em;
  margin-top: 20px;
  animation: fadeIn 3s ease-in-out;
}

.heart {
  font-size: 60px;
  animation: heartbeat 1s infinite;
  margin: 20px 0;
}

button {
  padding: 15px 30px;
  font-size: 18px;
  border: none;
  border-radius: 30px;
  background: white;
  color: #ff4e73;
  cursor: pointer;
  margin-top: 30px;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.1);
}

@keyframes heartbeat {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.2); }
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.hidden-message {
  display: none;
  margin-top: 30px;
  font-size: 1.5em;
  color: #fff;
}

  </style>
</head>
<body>  <div class="container">
    <h1>Ritika Jangra ❤️</h1>
    <div class="heart">💖</div>
    <p>You are the most special person in my life...</p>
    <p>Every moment with you feels like a dream come true ✨</p><button onclick="showMessage()">Click Me 💌</button>

<div class="hidden-message" id="message">
  💍 Ritika, will you be mine forever? 💖
</div>

  </div>  <script>
    function showMessage() {
      document.getElementById('message').style.display = 'block';
    }
  </script></body>
</html>
